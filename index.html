<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPA: PUZZLE PIECE TRACKER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --sonic-blue: #0042ad;
            --sonic-yellow: #ffe700;
            --sonic-red: #d60000;
            --emerald-green: #00ff41;
            --panel-bg: #000c22;
            --progress-blue: #00d2ff;
        }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Press Start 2P', cursive; font-size: 10px;
            display: flex; flex-direction: column; height: 100vh;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; overflow: hidden;
        }

        header {
            background: var(--sonic-blue); padding: 12px;
            text-align: center; border-bottom: 4px solid var(--sonic-yellow);
            box-shadow: 0 4px 0 var(--sonic-red); z-index: 100;
        }

        /* NEW VERTICAL LAYOUT */
        .main-layout {
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
        }

        .dashboard {
            background: var(--panel-bg); border-bottom: 4px solid #fff;
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
            max-height: 45vh; overflow-y: auto;
        }

        .stats-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: space-between; }
        .stat-block { flex: 1; min-width: 140px; }

        .progress-bar { width: 100%; height: 10px; background: #000; border: 2px solid #fff; margin-top: 4px; }
        .fill-stage { height: 100%; background: var(--emerald-green); width: 0%; transition: width 0.4s; }
        .fill-total { height: 100%; background: var(--progress-blue); width: 0%; transition: width 0.4s; }

        /* Level Selector Grid */
        .level-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 4px; margin: 10px 0;
        }
        .level-btn {
            padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid var(--sonic-blue);
            color: #fff; font-family: 'Press Start 2P'; font-size: 7px; cursor: pointer; text-align: left;
        }
        .level-btn.active { background: var(--sonic-blue); border-color: var(--sonic-yellow); box-shadow: inset 0 0 5px #fff; }

        /* Checklist */
        .checklist-container {
            border-top: 1px solid #333; padding-top: 10px;
        }
        .checklist-grid { display: flex; flex-wrap: wrap; gap: 5px; }
        .check-item {
            font-size: 6px; padding: 6px; border: 1px solid #444; cursor: pointer; background: #000;
            min-width: 40px; text-align: center;
        }
        .check-item.collected { color: #555; background: #111; border-color: var(--emerald-green); }
        .check-item:active { background: var(--sonic-yellow); color: #000; }

        /* MAP VIEWER - NOW TAKES REMAINING SPACE */
        .container { flex: 1; display: flex; flex-direction: column; background: #111; position: relative; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px; background: #000; border-bottom: 2px solid #fff; }

        button {
            padding: 6px 10px; background: var(--emerald-green); border: 2px solid #fff;
            font-family: 'Press Start 2P'; cursor: pointer; font-size: 7px;
        }
        button.export-btn { background: var(--sonic-yellow); color: #000; }

        .viewport { flex: 1; position: relative; overflow: hidden; cursor: grab; touch-action: none; }
        canvas { position: absolute; image-rendering: pixelated; transform-origin: 0 0; }
    </style>
</head>
<body>

<header><h1>SONIC POCKET ADVENTURE: PIECE TRACKER</h1></header>

<div class="main-layout">
    <div class="dashboard">
        <div class="stats-row">
            <div class="stat-block">
                <div style="font-size:7px;">ZONE PROGRESS: <span id="stagePerc">0%</span></div>
                <div class="progress-bar"><div id="stageFill" class="fill-stage"></div></div>
            </div>
            <div class="stat-block">
                <div style="font-size:7px;">TOTAL PIECES: <span id="totalStats">0/0</span></div>
                <div class="progress-bar"><div id="totalFill" class="fill-total"></div></div>
            </div>
        </div>

        <div class="level-grid" id="levelMenu"></div>

        <div class="checklist-container">
            <div style="color:var(--sonic-yellow); font-size:7px; margin-bottom:5px;">CHECKLIST (CLICK TO LOCATE):</div>
            <div id="pieceChecklist" class="checklist-grid"></div>
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <button onclick="triggerInput('mapFile')">LOAD MAP</button>
            <button onclick="triggerInput('bgmFile')">BGM</button>
            <button onclick="zoomToPiece(-1)">RESET VIEW</button>
            <button onclick="exportData()" class="export-btn">EXPORT JSON</button>
        </div>

        <div class="viewport" id="viewport">
            <canvas id="canvas"></canvas>
        </div>
    </div>
</div>

<input type="file" id="mapFile" hidden accept="image/*">
<input type="file" id="bgmFile" hidden accept="audio/*">
<audio id="bgm" loop></audio>

<script>
    const levels = [
        "Neo South Island Act 1", "Neo South Island Act 2", "Secret Plant Act 1", "Secret Plant Act 2",
        "Cosmic Casino Act 1", "Cosmic Casino Act 2", "Aquatic Relix Act 1", "Aquatic Relix Act 2",
        "Sky Chase", "Aerobase", "Gigantic Angel Act 1", "Gigantic Angel Act 2", "Last Utopia"
    ];

    let db, currentLevel = levels[0], markers = [], zoom = 1.0, offsetX = 0, offsetY = 0;
    let isDragging = false, lastX, lastY, initialPinchDist = 0;
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), viewport = document.getElementById('viewport'), bgm = document.getElementById('bgm');

    // --- DB SETUP (PRESERVING DATA) ---
    const request = indexedDB.open("SPA_Master_DB", 3);
    request.onsuccess = e => { db = e.target.result; init(); };

    async function getAsset(key) { return new Promise(r => { db.transaction("assets").objectStore("assets").get(key).onsuccess = e => r(e.target.result); }); }
    async function saveMarkers() { const tx = db.transaction("markers", "readwrite"); tx.objectStore("markers").put(markers, currentLevel); updateGlobalStats(); }
    async function getMarkers(lvl) { return new Promise(r => { db.transaction("markers").objectStore("markers").get(lvl).onsuccess = e => r(e.target.result || []); }); }

    async function init() {
        const menu = document.getElementById('levelMenu');
        levels.forEach(lvl => {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerText = lvl;
            btn.onclick = () => switchLevel(lvl);
            menu.appendChild(btn);
        });

        const savedBgm = await getAsset('bgm');
        if(savedBgm) bgm.src = URL.createObjectURL(savedBgm);
        
        switchLevel(currentLevel);
        setupGestures();
        updateGlobalStats();
    }

    async function switchLevel(lvl) {
        currentLevel = lvl;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.innerText === lvl));
        
        markers = await getMarkers(lvl);
        const mapData = await getAsset(`map_${lvl}`);
        if(mapData) {
            const img = await loadImage(URL.createObjectURL(mapData));
            canvas.width = img.width; canvas.height = img.height;
            render();
            zoomToPiece(-1); // Reset view
        } else {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            updateChecklist();
        }
    }

    // --- TELEPORT LOGIC ---
    function zoomToPiece(index) {
        if(index === -1) { // Default view
            zoom = 0.5; offsetX = 20; offsetY = 20;
        } else {
            const m = markers[index];
            zoom = 2.0; // Zoom in on the piece
            offsetX = (viewport.offsetWidth / 2) - (m.x * zoom);
            offsetY = (viewport.offsetHeight / 2) - (m.y * zoom);
        }
        updateTransform();
    }

    function render() {
        getAsset(`map_${currentLevel}`).then(async blob => {
            if(!blob) return;
            const img = await loadImage(URL.createObjectURL(blob));
            ctx.drawImage(img, 0, 0);
            markers.forEach(m => {
                ctx.lineWidth = 3;
                ctx.strokeStyle = m.collected ? '#444' : '#00ff41';
                ctx.strokeRect(m.x, m.y, 15, 22);
                if(m.collected) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(m.x, m.y, 15, 22); }
            });
            updateChecklist();
            updateTransform();
        });
    }

    function updateChecklist() {
        const list = document.getElementById('pieceChecklist');
        list.innerHTML = '';
        markers.forEach((m, i) => {
            const item = document.createElement('div');
            item.className = `check-item ${m.collected ? 'collected' : ''}`;
            item.innerText = `#${i+1}`;
            item.onclick = (e) => {
                e.stopPropagation();
                zoomToPiece(i);
            };
            // Double click or long press could toggle, but let's stick to a checkbox feel
            const check = document.createElement('input');
            check.type = 'checkbox';
            check.checked = m.collected;
            check.style.display = 'none';
            item.appendChild(check);
            
            item.oncontextmenu = (e) => { // Toggle collected status
                e.preventDefault();
                m.collected = !m.collected;
                saveMarkers(); render();
            };
            // Toggle for mobile/simple click
            item.addEventListener('dblclick', () => { m.collected = !m.collected; saveMarkers(); render(); });

            list.appendChild(item);
        });
        updateStats();
    }

    async function updateGlobalStats() {
        let totalPieces = 0, totalCollected = 0;
        for(let lvl of levels) {
            const m = await getMarkers(lvl);
            totalPieces += m.length;
            totalCollected += m.filter(p => p.collected).length;
        }
        const perc = totalPieces ? Math.round((totalCollected/totalPieces)*100) : 0;
        document.getElementById('totalStats').innerText = `${totalCollected}/${totalPieces}`;
        document.getElementById('totalFill').style.width = perc + '%';
    }

    function updateStats() {
        let collected = markers.filter(m => m.collected).length;
        const stagePerc = markers.length ? Math.round((collected/markers.length)*100) : 0;
        document.getElementById('stagePerc').innerText = stagePerc + '%';
        document.getElementById('stageFill').style.width = stagePerc + '%';
    }

    // --- JSON EXPORT ---
    async function exportData() {
        const fullData = {};
        for(let lvl of levels) {
            const m = await getMarkers(lvl);
            fullData[lvl] = m.map(p => ({ x: p.x, y: p.y })); // Exporting coordinates only
        }
        const blob = new Blob([JSON.stringify(fullData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'SPA_PuzzlePieces_Data.json';
        a.click();
    }

    // --- GESTURE ENGINE ---
    function setupGestures() {
        viewport.onmousedown = e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
        window.onmouseup = () => isDragging = false;
        window.onmousemove = e => {
            if(!isDragging) return;
            offsetX += (e.clientX - lastX); offsetY += (e.clientY - lastY);
            lastX = e.clientX; lastY = e.clientY;
            updateTransform();
        };

        viewport.addEventListener('touchstart', e => {
            if(e.touches.length === 1) {
                isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            } else if(e.touches.length === 2) {
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        });

        viewport.addEventListener('touchmove', e => {
            e.preventDefault();
            if(e.touches.length === 1 && isDragging) {
                offsetX += (e.touches[0].clientX - lastX); offsetY += (e.touches[0].clientY - lastY);
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            } else if(e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                zoom *= (dist / initialPinchDist);
                initialPinchDist = dist;
            }
            updateTransform();
        }, {passive: false});

        viewport.onwheel = e => {
            e.preventDefault();
            zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
            updateTransform();
        };
    }

    function updateTransform() {
        canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${zoom})`;
    }

    canvas.onclick = e => {
        if(isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;
        const m = markers.find(m => (Math.abs(m.x + 7 - x) < 15 && Math.abs(m.y + 11 - y) < 15));
        if(m) { m.collected = !m.collected; saveMarkers(); render(); }
    };

    function triggerInput(id) { document.getElementById(id).click(); }
    document.getElementById('mapFile').onchange = e => {
        const file = e.target.files[0];
        const tx = db.transaction("assets", "readwrite");
        tx.objectStore("assets").put(file, `map_${currentLevel}`).onsuccess = () => switchLevel(currentLevel);
    };
    function loadImage(s) { return new Promise(r => {const i=new Image(); i.onload=()=>r(i); i.src=s;}); }
</script>
</body>
</html>
